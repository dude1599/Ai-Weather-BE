name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/ai-weather-0.0.1-SNAPSHOT.jar"
          target: "~/Ai-Weather-BE/build/libs/"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 기존 프로세스 확실히 종료
            sudo pkill -9 -f java || true
            sleep 3
            
            # 2. 새 버전 실행 (메모리 제한 및 세션 분리)
            cd ~/Ai-Weather-BE/build/libs
            nohup java -Xms128M -Xmx256M -jar ai-weather-0.0.1-SNAPSHOT.jar > ~/deploy.log 2>&1 &
            disown # SSH가 끊겨도 프로세스가 유지되게 함
            
            # 3. 5초 후 정상 실행 여부 확인
            sleep 5
            ps -ef | grep java | grep -v grep
