name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew build -x test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 기존 서버 종료
            sudo pkill -9 -f java || true
            sleep 3 
            
            # 2. 서버 실행 (메모리 제한 옵션 추가)
            cd ~/Ai-Weather-BE/build/libs
            nohup java -Xms128M -Xmx512M -jar ai-weather-0.0.1-SNAPSHOT.jar > ~/deploy.log 2>&1 & disown
            
            # 3. 실행 확인 (성공 메시지만 출력)
            echo "Deployment command executed. Check http://aiweather.store/weather in a few seconds."
