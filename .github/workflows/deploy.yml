name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: chmod +x gradlew && ./gradlew build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/ai-weather-0.0.1-SNAPSHOT.jar"
          target: "~/Ai-Weather-BE/build/libs/"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 기존 자바 완전 종료 및 잔여 메모리 정리
            sudo pkill -9 -f java || true
            sleep 2
            
            # 2. 시스템 캐시 강제 비우기 (메모리 확보 핵심 명령어)
            sudo sync && echo 3 | sudo tee /proc/sys/vm/drop_caches
            
            # 3. 초경량 모드로 실행 (최대 메모리를 128MB로 극단적 제한)
            # -Xmx256M: 서버가 죽지 않도록 메모리 사용량을 최소화합니다.
            cd ~/Ai-Weather-BE/build/libs
            nohup java -Xms64M -Xmx128M -jar ai-weather-0.0.1-SNAPSHOT.jar > ~/deploy.log 2>&1 &
            
            # 4. 프로세스 독립 및 완료 메시지
            disown
            echo "Deployment finished. Wait 10 seconds and check http://aiweather.store/weather"
